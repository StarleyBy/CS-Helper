<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CS Helper — Cardiac Surgery Pocket Reference">
  <meta name="theme-color" content="#0f1117">
  <title>CS Helper</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="app.css">
  <script>
    // Fix for GitHub Pages subdirectories without trailing slash
    (function() {
      const path = window.location.pathname;
      if (path.length > 1 && !path.endsWith('/') && !path.split('/').pop().includes('.')) {
        window.location.replace(path + '/');
      }
    })();
  </script>
</head>
<body>

<!-- ── LOGIN SCREEN ──────────────────────────────────── -->
<div id="login-screen" style="display:none">
  <div id="login-box">
    <div id="login-logo">🫀</div>
    <h2>CS Helper</h2>
    <p>Cardiac Surgery Pocket Reference</p>
    <input type="password" id="login-pw" class="login-field" placeholder="Enter password" autocomplete="off">
    <button id="login-btn">Sign In</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- ── MOBILE OVERLAY ────────────────────────────────── -->
<div id="overlay"></div>

<!-- ── APP SHELL ─────────────────────────────────────── -->
<div id="app">

  <!-- SIDEBAR -->
  <nav id="sidebar">
    <div id="sidebar-header">
      <div id="sidebar-logo">🫀</div>
      <span id="sidebar-title">CS Helper</span>
      <span id="sidebar-badge">v1</span>
    </div>

    <div id="sidebar-search-wrap">
      <input type="text" id="sidebar-search" placeholder="Search…" autocomplete="off">
    </div>

    <div id="sidebar-nav"></div>

    <div id="sidebar-footer">
      <div id="user-indicator">
        <div id="user-dot"></div>
        <span id="user-role-label">User</span>
      </div>
      <div id="sidebar-footer-actions">
        <button class="footer-btn admin-only" onclick="window.open('redact.html','_blank')" title="Open Editor">✏️</button>
        <button class="footer-btn" onclick="logout()" title="Sign out">⏻</button>
      </div>
    </div>
  </nav>

  <!-- MAIN -->
  <div id="main">
    <div id="topbar">
      <button id="menu-toggle">☰</button>
      <div id="page-breadcrumb"></div>
      <span id="page-title-bar">CS Helper</span>
      <div id="topbar-actions">
        <button class="topbar-btn" id="theme-toggle">🌙</button>
      </div>
    </div>
    <div id="content-area">
      <p class="loading-msg">Initializing…</p>
    </div>
  </div>
</div>

<!-- ── LIBS (Local for offline PWA) ── -->
<script src="libs/js-yaml.min.js"></script>
<script src="libs/marked.min.js"></script>
<script src="app.js"></script>
</body>
</html>
