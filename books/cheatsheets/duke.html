<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Duke Criteria for Infective Endocarditis | 2023 ISCVID vs 2015 Modified Duke</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0f111a;
            font-family: 'Inter', system-ui, 'Segoe UI', Roboto, sans-serif;
            color: #eef2ff;
            padding: 24px 20px;
            transition: background 0.2s;
        }
        body.light {
            background: #f1f5f9;
            --card-bg: #ffffff;
            --border: #cbd5e1;
            --text: #0f172a;
            --text-muted: #334155;
            --accent: #2563eb;
            --accent-light: #dbeafe;
            --hover-bg: #f8fafc;
        }
        :root {
            --card-bg: #16202e;
            --border: #2a3a4e;
            --text: #eef2ff;
            --text-muted: #9ab3cf;
            --accent: #3b82f6;
            --accent-light: #1e3a8a;
            --hover-bg: #1e293b;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #3b82f6, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        .subhead {
            color: var(--text-muted);
            font-size: 14px;
        }
        .version-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 24px;
            background: var(--card-bg);
            border-radius: 60px;
            padding: 8px 20px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            border: 1px solid var(--border);
        }
        .version-option {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 6px 14px;
            border-radius: 40px;
            transition: 0.1s;
        }
        .version-option.active {
            background: var(--accent);
            color: white;
        }
        .version-option input {
            display: none;
        }
        .grid-2col {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
            gap: 24px;
            margin-bottom: 24px;
        }
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 20px;
            transition: 0.1s;
        }
        .card-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 20px;
            border-left: 5px solid var(--accent);
            padding-left: 16px;
        }
        .group-header {
            font-size: 18px;
            font-weight: 600;
            margin: 20px 0 12px 0;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .subgroup {
            background: var(--hover-bg);
            border-radius: 20px;
            margin-bottom: 16px;
            padding: 12px 16px;
            border-left: 3px solid var(--accent);
        }
        .subgroup-title {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 6px;
        }
        .criteria-item {
            background: var(--hover-bg);
            border-radius: 16px;
            margin-bottom: 12px;
            padding: 12px 16px;
            cursor: pointer;
            transition: 0.1s;
            border: 1px solid transparent;
        }
        .criteria-item:hover {
            border-color: var(--accent);
        }
        .criteria-header {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .criteria-header input {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--accent);
        }
        .criteria-name {
            font-weight: 600;
            font-size: 15px;
        }
        .criteria-desc {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 8px;
            margin-left: 32px;
            line-height: 1.45;
        }
        .result-panel {
            background: var(--accent-light);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 24px;
            text-align: center;
        }
        .diagnosis {
            font-size: 36px;
            font-weight: 800;
            margin: 16px 0;
        }
        .diagnosis.definite { color: #10b981; }
        .diagnosis.possible { color: #f59e0b; }
        .diagnosis.rejected { color: #ef4444; }
        .count-badge {
            display: inline-block;
            background: var(--card-bg);
            padding: 4px 12px;
            border-radius: 40px;
            font-family: monospace;
            margin: 4px;
        }
        .note {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 16px;
            border-top: 1px solid var(--border);
            padding-top: 12px;
        }
        .tooltip-icon {
            display: inline-block;
            width: 18px;
            height: 18px;
            background: var(--accent);
            color: white;
            border-radius: 50%;
            text-align: center;
            font-size: 11px;
            line-height: 18px;
            margin-left: 6px;
            cursor: help;
        }
        .theme-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 12px;
            z-index: 100;
        }
        @media (max-width: 700px) {
            .grid-2col { grid-template-columns: 1fr; }
            .diagnosis { font-size: 28px; }
        }
        hr { margin: 12px 0; border-color: var(--border); }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📋 Duke Criteria for Infective Endocarditis</h1>
        <div class="subhead">Comparison: 2023 ISCVID update vs. 2015 Modified Duke (pre‑2023 standard)</div>
    </div>

    <!-- Version selector -->
    <div class="version-bar" id="versionSelector">
        <label class="version-option active" id="ver2023">
            <input type="radio" name="version" value="2023" checked> 2023 ISCVID (latest)
        </label>
        <label class="version-option" id="ver2015">
            <input type="radio" name="version" value="2015"> 2015 Modified Duke (previous)
        </label>
    </div>

    <div class="result-panel" id="resultPanel">
        <div style="font-size: 18px; font-weight: 600;">Diagnostic classification</div>
        <div class="diagnosis" id="diagnosisText">—</div>
        <div id="scoreDetail" style="font-size: 14px;"></div>
        <div class="note" id="ruleNote"></div>
    </div>

    <div class="grid-2col" id="criteriaContainer">
        <!-- dynamic content loaded by JS -->
    </div>

    <div class="card" id="infoCard">
        <div class="card-title">📖 Clinical notes & differences between versions</div>
        <div class="note" style="margin-top: 0;" id="infoText"></div>
    </div>

    <div class="note" style="text-align: center; margin-top: 20px;">
        Based on: Duke‑ISCVID Criteria 2023 (Clin Infect Dis) and Modified Duke Criteria 2015 (ESC Guidelines).
    </div>
</div>
<button class="theme-toggle" id="themeToggle">🌓 Dark / Light</button>

<script>
    // DOM elements
    const version2023Radio = document.querySelector('#ver2023 input');
    const version2015Radio = document.querySelector('#ver2015 input');
    const criteriaContainer = document.getElementById('criteriaContainer');
    const diagnosisEl = document.getElementById('diagnosisText');
    const scoreDetailEl = document.getElementById('scoreDetail');
    const ruleNote = document.getElementById('ruleNote');
    const infoText = document.getElementById('infoText');

    // Global state
    let currentVersion = '2023'; // '2023' or '2015'
    // We'll store checkboxes references dynamically; we'll rebuild UI on version change.

    function buildUI(version) {
        // Generate HTML for major and minor criteria according to version
        let html = '';
        if (version === '2023') {
            html = `
                <div class="card">
                    <div class="card-title">🔬 Major Criteria (grouped, 2023)</div>
                    <div class="group-header">🦠 Microbiological evidence</div>
                    <div class="subgroup">
                        <div class="subgroup-title">Select any of the following (one major)</div>
                        <label class="criteria-item" data-major-group="micro">
                            <div class="criteria-header"><input type="checkbox" class="major-micro" value="micro"> <span class="criteria-name">Two positive blood cultures for typical IE microorganisms</span></div>
                            <div class="criteria-desc">Typical pathogens: S. aureus, viridans group streptococci, S. gallolyticus, HACEK group, Enterococcus spp., community‑acquired S. pneumoniae.</div>
                        </label>
                        <label class="criteria-item" data-major-group="micro">
                            <div class="criteria-header"><input type="checkbox" class="major-micro" value="micro"> <span class="criteria-name">Single positive blood culture for Coxiella burnetii</span></div>
                            <div class="criteria-desc">Alternatively, phase I IgG antibody titer ≥1:800 (Q fever).</div>
                        </label>
                        <label class="criteria-item" data-major-group="micro">
                            <div class="criteria-header"><input type="checkbox" class="major-micro" value="micro"> <span class="criteria-name">Molecular detection (PCR) from blood or valve tissue</span></div>
                            <div class="criteria-desc">Broad‑range PCR or specific PCR for pathogens such as Tropheryma whipplei, Bartonella, Legionella.</div>
                        </label>
                    </div>
                    <div class="group-header">📷 Imaging evidence</div>
                    <div class="subgroup">
                        <div class="subgroup-title">Select any of the following (one major)</div>
                        <label class="criteria-item" data-major-group="imaging">
                            <div class="criteria-header"><input type="checkbox" class="major-imaging" value="imaging"> <span class="criteria-name">Echocardiography (TTE/TEE) positive</span></div>
                            <div class="criteria-desc">Vegetation, abscess, pseudoaneurysm, intracardiac fistula, or new partial dehiscence of prosthetic valve.</div>
                        </label>
                        <label class="criteria-item" data-major-group="imaging">
                            <div class="criteria-header"><input type="checkbox" class="major-imaging" value="imaging"> <span class="criteria-name">PET/CT or CT angiography positive</span></div>
                            <div class="criteria-desc">Abnormal metabolic activity around implanted valve/device (PET/CT) or peri‑prosthetic lesions (CTA).</div>
                        </label>
                    </div>
                    <div class="group-header">🔪 Pathological evidence</div>
                    <div class="subgroup">
                        <div class="subgroup-title">Select any of the following (one major)</div>
                        <label class="criteria-item" data-major-group="path">
                            <div class="criteria-header"><input type="checkbox" class="major-path" value="path"> <span class="criteria-name">Microorganisms demonstrated by culture or histology</span></div>
                            <div class="criteria-desc">From vegetation, embolized vegetation, or intracardiac abscess.</div>
                        </label>
                        <label class="criteria-item" data-major-group="path">
                            <div class="criteria-header"><input type="checkbox" class="major-path" value="path"> <span class="criteria-name">Active endocarditis lesions (histology)</span></div>
                            <div class="criteria-desc">Histological evidence of active endocarditis (vegetation/inflammation).</div>
                        </label>
                    </div>
                </div>
                <div class="card">
                    <div class="card-title">🩺 Minor Criteria (detailed, 2023)</div>
                    <label class="criteria-item" data-minor>
                        <div class="criteria-header"><input type="checkbox" class="minor" data-minor-id="predispose"> <span class="criteria-name">Predisposing heart condition</span></div>
                        <div class="criteria-desc">Valvular heart disease, congenital heart disease, previous infective endocarditis, prosthetic valve, intravenous drug use.</div>
                    </label>
                    <label class="criteria-item" data-minor>
                        <div class="criteria-header"><input type="checkbox" class="minor" data-minor-id="fever"> <span class="criteria-name">Fever ≥38°C (100.4°F)</span></div>
                        <div class="criteria-desc">Documented fever of ≥38°C.</div>
                    </label>
                    <label class="criteria-item" data-minor>
                        <div class="criteria-header"><input type="checkbox" class="minor" data-minor-id="vascular"> <span class="criteria-name">Vascular phenomena</span></div>
                        <div class="criteria-desc">Arterial emboli, septic pulmonary infarcts, mycotic aneurysm, intracranial hemorrhage, conjunctival hemorrhage. <strong>Janeway lesions</strong> (painless palmar/plantar macules, acute IE).</div>
                    </label>
                    <label class="criteria-item" data-minor>
                        <div class="criteria-header"><input type="checkbox" class="minor" data-minor-id="immuno"> <span class="criteria-name">Immunological phenomena</span></div>
                        <div class="criteria-desc">Glomerulonephritis, <strong>Osler nodes</strong> (painful finger pulps – immune complex, subacute IE), <strong>Roth spots</strong> (retinal haemorrhages with pale centre), rheumatoid factor.</div>
                    </label>
                    <label class="criteria-item" data-minor>
                        <div class="criteria-header"><input type="checkbox" class="minor" data-minor-id="micro_minor"> <span class="criteria-name">Microbiological evidence (minor)</span></div>
                        <div class="criteria-desc">Single positive blood culture for typical organism not meeting major, or serologic evidence (e.g., Coxiella burnetii phase II IgG ≥1:800).</div>
                    </label>
                    <label class="criteria-item" data-minor>
                        <div class="criteria-header"><input type="checkbox" class="minor" data-minor-id="pet_minor"> <span class="criteria-name">Abnormal PET/CT (minor)</span></div>
                        <div class="criteria-desc">Metabolic abnormality not fulfilling major imaging criteria.</div>
                    </label>
                </div>
            `;
        } else { // 2015 version
            html = `
                <div class="card">
                    <div class="card-title">🔬 Major Criteria (2015 Modified Duke)</div>
                    <div class="group-header">🦠 Microbiological evidence</div>
                    <div class="subgroup">
                        <div class="subgroup-title">Select any of the following (one major)</div>
                        <label class="criteria-item" data-major-group="micro">
                            <div class="criteria-header"><input type="checkbox" class="major-micro" value="micro"> <span class="criteria-name">Two positive blood cultures for typical IE microorganisms</span></div>
                            <div class="criteria-desc">Typical pathogens: S. aureus, viridans streptococci, S. gallolyticus, HACEK, Enterococcus, S. pneumoniae.</div>
                        </label>
                        <label class="criteria-item" data-major-group="micro">
                            <div class="criteria-header"><input type="checkbox" class="major-micro" value="micro"> <span class="criteria-name">Single positive Coxiella burnetii or phase I IgG ≥1:800</span></div>
                            <div class="criteria-desc">Q fever endocarditis.</div>
                        </label>
                        <label class="criteria-item" data-major-group="micro">
                            <div class="criteria-header"><input type="checkbox" class="major-micro" value="micro"> <span class="criteria-name">Persistently positive blood cultures</span></div>
                            <div class="criteria-desc">Two positive drawn >12h apart, or majority positive of ≥4 with first/last ≥1h.</div>
                        </label>
                    </div>
                    <div class="group-header">🔍 Evidence of endocardial involvement</div>
                    <div class="subgroup">
                        <div class="subgroup-title">Select any of the following (one major)</div>
                        <label class="criteria-item" data-major-group="imaging">
                            <div class="criteria-header"><input type="checkbox" class="major-imaging" value="imaging"> <span class="criteria-name">Echocardiography positive (TTE/TEE)</span></div>
                            <div class="criteria-desc">Vegetation, abscess, pseudoaneurysm, new dehiscence of prosthetic valve.</div>
                        </label>
                        <label class="criteria-item" data-major-group="imaging">
                            <div class="criteria-header"><input type="checkbox" class="major-imaging" value="imaging"> <span class="criteria-name">New valvular regurgitation</span></div>
                            <div class="criteria-desc">New regurgitant murmur (not a stand-alone major, but included in original).</div>
                        </label>
                    </div>
                    <div class="group-header">🔪 Pathological evidence</div>
                    <div class="subgroup">
                        <div class="subgroup-title">Select any of the following (one major)</div>
                        <label class="criteria-item" data-major-group="path">
                            <div class="criteria-header"><input type="checkbox" class="major-path" value="path"> <span class="criteria-name">Microorganisms on culture/histology of vegetation or abscess</span></div>
                            <div class="criteria-desc">From surgical specimen or autopsy.</div>
                        </label>
                        <label class="criteria-item" data-major-group="path">
                            <div class="criteria-header"><input type="checkbox" class="major-path" value="path"> <span class="criteria-name">Active endocarditis (histological lesions)</span></div>
                            <div class="criteria-desc">Vegetation or intracardiac abscess with active inflammation.</div>
                        </label>
                    </div>
                </div>
                <div class="card">
                    <div class="card-title">🩺 Minor Criteria (2015 Modified Duke)</div>
                    <label class="criteria-item" data-minor>
                        <div class="criteria-header"><input type="checkbox" class="minor" data-minor-id="predispose"> <span class="criteria-name">Predisposing heart condition or IV drug use</span></div>
                        <div class="criteria-desc">Valvular heart disease, congenital heart disease, previous IE, prosthetic valve, IV drug use.</div>
                    </label>
                    <label class="criteria-item" data-minor>
                        <div class="criteria-header"><input type="checkbox" class="minor" data-minor-id="fever"> <span class="criteria-name">Fever ≥38°C</span></div>
                        <div class="criteria-desc">Documented fever of ≥38°C.</div>
                    </label>
                    <label class="criteria-item" data-minor>
                        <div class="criteria-header"><input type="checkbox" class="minor" data-minor-id="vascular"> <span class="criteria-name">Vascular phenomena</span></div>
                        <div class="criteria-desc">Arterial emboli, septic pulmonary infarcts, mycotic aneurysm, intracranial haemorrhage, Janeway lesions.</div>
                    </label>
                    <label class="criteria-item" data-minor>
                        <div class="criteria-header"><input type="checkbox" class="minor" data-minor-id="immuno"> <span class="criteria-name">Immunological phenomena</span></div>
                        <div class="criteria-desc">Glomerulonephritis, Osler nodes, Roth spots, rheumatoid factor.</div>
                    </label>
                    <label class="criteria-item" data-minor>
                        <div class="criteria-header"><input type="checkbox" class="minor" data-minor-id="micro_minor"> <span class="criteria-name">Microbiological evidence (minor)</span></div>
                        <div class="criteria-desc">Single positive blood culture for typical organism not meeting major, or serologic evidence not meeting major.</div>
                    </label>
                </div>
            `;
        }
        criteriaContainer.innerHTML = html;
        attachEventListeners();
        updateDiagnosis();
    }

    function attachEventListeners() {
        // Attach change event to all checkboxes
        const allCheckboxes = document.querySelectorAll('input[type="checkbox"]');
        allCheckboxes.forEach(cb => {
            cb.removeEventListener('change', updateDiagnosis);
            cb.addEventListener('change', updateDiagnosis);
        });
    }

    function countMajor2023() {
        // groups: micro, imaging, path – each at most 1
        const microGroup = document.querySelectorAll('.major-micro');
        const imagingGroup = document.querySelectorAll('.major-imaging');
        const pathGroup = document.querySelectorAll('.major-path');
        let micro = Array.from(microGroup).some(cb => cb.checked);
        let imaging = Array.from(imagingGroup).some(cb => cb.checked);
        let path = Array.from(pathGroup).some(cb => cb.checked);
        return (micro ? 1 : 0) + (imaging ? 1 : 0) + (path ? 1 : 0);
    }

    function countMajor2015() {
        // In 2015, each criterion is separate? Actually original: 1) Blood culture positive, 2) Echo positive, 3) Pathological. But some sub-items count as one major each? The 2015 ESC uses: Major: 1) Typical blood culture, 2) Evidence of endocardial involvement (echo), 3) Pathological. So grouping similar to 2023 but without PET. We'll group: micro group, echo group, path group.
        const microGroup = document.querySelectorAll('.major-micro');
        const imagingGroup = document.querySelectorAll('.major-imaging');
        const pathGroup = document.querySelectorAll('.major-path');
        let micro = Array.from(microGroup).some(cb => cb.checked);
        let imaging = Array.from(imagingGroup).some(cb => cb.checked);
        let path = Array.from(pathGroup).some(cb => cb.checked);
        return (micro ? 1 : 0) + (imaging ? 1 : 0) + (path ? 1 : 0);
    }

    function countMinor() {
        const minorBoxes = document.querySelectorAll('.minor');
        return Array.from(minorBoxes).filter(cb => cb.checked).length;
    }

    function updateDiagnosis() {
        let major = 0;
        let minor = countMinor();
        const pathologicalPresent = (currentVersion === '2023') ?
            Array.from(document.querySelectorAll('.major-path')).some(cb => cb.checked) :
            Array.from(document.querySelectorAll('.major-path')).some(cb => cb.checked);
        
        if (currentVersion === '2023') {
            major = countMajor2023();
        } else {
            major = countMajor2015();
        }
        
        let diagnosis = '';
        let detail = '';
        
        if (pathologicalPresent) {
            diagnosis = 'Definite Infective Endocarditis';
            detail = 'Pathological evidence (surgical/autopsy) → Definite IE.';
        } else {
            if (currentVersion === '2023') {
                if (major >= 2 || (major === 1 && minor >= 3) || minor >= 5) {
                    diagnosis = 'Definite Infective Endocarditis';
                    detail = `${major} Major, ${minor} Minor → Definite IE.`;
                } else if ((major === 1 && minor >= 1) || minor >= 3) {
                    diagnosis = 'Possible Infective Endocarditis';
                    detail = `${major} Major, ${minor} Minor → Possible IE.`;
                } else {
                    diagnosis = 'Rejected (or unlikely) IE';
                    detail = `${major} Major, ${minor} Minor → Does not meet criteria.`;
                }
            } else { // 2015
                if (major >= 2 || (major === 1 && minor >= 3) || minor >= 5) {
                    diagnosis = 'Definite Infective Endocarditis';
                    detail = `${major} Major, ${minor} Minor → Definite IE (2015 criteria).`;
                } else if ((major === 1 && minor >= 1) || minor >= 3) {
                    diagnosis = 'Possible Infective Endocarditis';
                    detail = `${major} Major, ${minor} Minor → Possible IE.`;
                } else {
                    diagnosis = 'Rejected (or unlikely) IE';
                    detail = `${major} Major, ${minor} Minor → Does not meet criteria.`;
                }
            }
        }
        
        diagnosisEl.textContent = diagnosis;
        scoreDetailEl.innerHTML = `<span class="count-badge">🔬 Major: ${major}</span> <span class="count-badge">🩺 Minor: ${minor}</span><br>${detail}`;
        
        diagnosisEl.classList.remove('definite', 'possible', 'rejected');
        if (diagnosis.startsWith('Definite')) diagnosisEl.classList.add('definite');
        else if (diagnosis.startsWith('Possible')) diagnosisEl.classList.add('possible');
        else diagnosisEl.classList.add('rejected');
        
        if (currentVersion === '2023') {
            ruleNote.innerHTML = '<strong>Definite:</strong> 2 Major / 1 Major + 3 Minor / 5 Minor &nbsp;&nbsp; <strong>Possible:</strong> 1 Major + 1 Minor / 3 Minor';
        } else {
            ruleNote.innerHTML = '<strong>Definite (2015):</strong> 2 Major / 1 Major + 3 Minor / 5 Minor &nbsp;&nbsp; <strong>Possible:</strong> 1 Major + 1 Minor / 3 Minor';
        }
    }

    // Version switch
    function setVersion(version) {
        currentVersion = version;
        buildUI(version);
        // Update version bar active style
        document.querySelectorAll('.version-option').forEach(opt => opt.classList.remove('active'));
        if (version === '2023') document.getElementById('ver2023').classList.add('active');
        else document.getElementById('ver2015').classList.add('active');
        
        // Update info text
        if (version === '2023') {
            infoText.innerHTML = `<strong>2023 ISCVID update:</strong> Major criteria grouped as microbiological, imaging (including PET/CT), and pathological. Minor criteria include abnormal PET/CT. Janeway lesions (acute IE) vs Osler nodes (subacute IE) are distinguished. PET/CT is a major or minor depending on certainty.`;
        } else {
            infoText.innerHTML = `<strong>2015 Modified Duke (previous standard):</strong> Major criteria: positive blood culture, evidence of endocardial involvement (echo only, no PET/CT), and pathological. Minor criteria do not include PET. Janeway lesions and Osler nodes are both considered vascular/immunological phenomena respectively.`;
        }
    }

    // Event listeners for version radio
    version2023Radio.addEventListener('change', () => {
        if (version2023Radio.checked) setVersion('2023');
    });
    version2015Radio.addEventListener('change', () => {
        if (version2015Radio.checked) setVersion('2015');
    });
    
    // Initial load
    setVersion('2023');
    
    // Theme toggle
    const themeBtn = document.getElementById('themeToggle');
    themeBtn.addEventListener('click', () => {
        document.body.classList.toggle('light');
        localStorage.setItem('dukeTheme', document.body.classList.contains('light') ? 'light' : 'dark');
    });
    if (localStorage.getItem('dukeTheme') === 'light') document.body.classList.add('light');
</script>
</body>
</html>
