<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Pediatric Emergency &amp; ICU Drug Calculator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f8f9fc;
            font-family: 'Inter', system-ui, 'Segoe UI', Roboto, sans-serif;
            color: #1e2937;
            padding: 20px;
        }
        .container {
            max-width: 1500px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%);
            color: white;
            padding: 24px 32px;
        }
        .header h1 { font-size: 26px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .header p { color: #93c5fd; font-size: 13px; margin-top: 4px; }
        
        .patient-info {
            background: #f1f5f9;
            padding: 20px 32px;
            border-bottom: 1px solid #e2e8f0;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            align-items: end;
        }
        .input-group { display: flex; flex-direction: column; gap: 6px; }
        .input-group label {
            font-size: 11px;
            font-weight: 700;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .input-group input {
            padding: 10px 14px;
            border: 2px solid #cbd5e1;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            color: #1e2937;
            background: white;
        }
        .input-group input:focus { outline: none; border-color: #2563eb; }
        .input-group input[readonly] { background: #e2e8f0; border-color: #cbd5e1; cursor: not-allowed; }

        .meta-calculated {
            background: #e0f2fe;
            border: 1px solid #bae6fd;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            color: #0369a1;
            min-height: 43px;
            display: flex;
            align-items: center;
        }

        .tabs {
            display: flex;
            background: #f8f9fc;
            padding: 12px 32px 0 32px;
            border-bottom: 1px solid #e2e8f0;
            gap: 6px;
            overflow-x: auto;
        }
        .tab-btn {
            padding: 12px 18px;
            border: none;
            background: none;
            font-size: 13.5px;
            font-weight: 600;
            color: #64748b;
            cursor: pointer;
            border-radius: 10px 10px 0 0;
            border: 1px solid transparent;
            margin-bottom: -1px;
            white-space: nowrap;
            transition: all 0.15s;
        }
        .tab-btn:hover { color: #1e40af; background: #f1f5f9; }
        .tab-btn.active {
            color: #1e40af;
            background: white;
            border-color: #e2e8f0 #e2e8f0 transparent #e2e8f0;
            font-weight: 700;
        }

        .tab-content { padding: 32px; display: none; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 13.5px; }
        th { background: #f8fafc; padding: 12px 16px; font-weight: 600; color: #475569; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px 16px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; line-height: 1.4; }
        tr:hover td { background: #f8fafc; }
        
        .dose-value {
            font-family: monospace;
            font-size: 14.5px;
            font-weight: 700;
            color: #16a34a;
            background: #f0fdf4;
            padding: 6px 12px;
            border-radius: 8px;
            display: inline-block;
            white-space: nowrap;
        }
        .info { color: #64748b; font-size: 12.5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🩺 Pediatric ICU &amp; Emergency Calculator</h1>
        <p>Полная математическая синхронизация с Excel-протоколом «דף החייאה 21.05»</p>
    </div>

    <div class="patient-info">
        <div class="input-group">
            <label>Name (B2)</label>
            <input type="text" id="pName" value="רפאל">
        </div>
        <div class="input-group">
            <label>D.O.B (G2)</label>
            <input type="date" id="dob" value="2025-08-06" onchange="updateAll()">
        </div>
        <div class="input-group">
            <label>Weight kg (D2)</label>
            <input type="number" id="weight" value="4.995" step="0.001" oninput="updateAll()">
        </div>
        <div class="input-group">
            <label>Age in Years (B3)</label>
            <div id="ageDisplay" class="meta-calculated">—</div>
        </div>
        <div class="input-group">
            <label>E.T. Size (D3)</label>
            <div id="etDisplay" class="meta-calculated">—</div>
        </div>
        <div class="input-group">
            <label>BSA m² (H3)</label>
            <div id="bsaDisplay" class="meta-calculated">—</div>
        </div>
        <div class="input-group">
            <label>Height cm (F3)</label>
            <div id="heightDisplay" class="meta-calculated">—</div>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="resus">Resuscitation (5-29)</button>
        <button class="tab-btn" data-tab="intub">Intubation (30-43)</button>
        <button class="tab-btn" data-tab="sedation">Sedation Infusions (44-74)</button>
        <button class="tab-btn" data-tab="drips">Drugs in Drip (75-150)</button>
        <button class="tab-btn" data-tab="various">Various Drugs (151-178)</button>
        <button class="tab-btn" data-tab="abx">Antibiotics I.V. (179-203)</button>
    </div>

    <div id="tab-resus" class="tab-content" style="display: block;"><table id="resus-table"></table></div>
    <div id="tab-intub" class="tab-content"><table id="intub-table"></table></div>
    <div id="tab-sedation" class="tab-content"><table id="sedation-table"></table></div>
    <div id="tab-drips" class="tab-content"><table id="drip-table"></table></div>
    <div id="tab-various" class="tab-content"><table id="various-table"></table></div>
    <div id="tab-abx" class="tab-content"><table id="abx-table"></table></div>
</div>

<script>
// Вспомогательные функции безопасного математического округления Excel
function excelRound(value, decimals) {
    if (isNaN(value) || !isFinite(value)) return 0;
    return Number(Math.round(value + 'e' + decimals) + 'e-' + decimals);
}

// Глобальный объект промежуточных вычисляемых переменных
let calcVars = { w: 4.995, age: 0, bsa: 0, height: 0, et: 0 };

function updateCalculatedVariables() {
    let w = parseFloat(document.getElementById('weight').value) || 0;
    calcVars.w = w;

    // 1. Возраст Age (B3): =(NOW - DOB)/365.25
    let dobInput = document.getElementById('dob').value;
    if (dobInput) {
        let dobDate = new Date(dobInput);
        let now = new Date();
        let diffTime = now - dobDate;
        let diffYears = diffTime / (1000 * 60 * 60 * 24 * 365.25);
        calcVars.age = diffYears > 0 ? diffYears : 0;
    } else {
        calcVars.age = 0;
    }
    document.getElementById('ageDisplay').textContent = calcVars.age.toFixed(3);

    // 2. BSA (H3): =IF((D2+4)/30<1.75, (D2+4)/30, 1.75)
    let bsaRaw = (w + 4) / 30;
    calcVars.bsa = bsaRaw < 1.75 ? bsaRaw : 1.75;
    document.getElementById('bsaDisplay').textContent = calcVars.bsa.toFixed(3);

    // 3. Height (F3): =IF(D2<31, H3*H3*3600/D2, IF(D2<41,160,170))
    if (w > 0) {
        calcVars.height = w < 31 ? (calcVars.bsa * calcVars.bsa * 3600 / w) : (w < 41 ? 160 : 170);
    } else {
        calcVars.height = 0;
    }
    document.getElementById('heightDisplay').textContent = calcVars.height.toFixed(1);

    // 4. E.T. (D3): =IF(B3<0.3,3, IF(B3<0.6,4, IF(B3/4+4>8,8, B3/4+4)))
    let etVal = 3;
    if (calcVars.age < 0.3) { etVal = 3; }
    else if (calcVars.age < 0.6) { etVal = 4; }
    else {
        let calcEt = (calcVars.age / 4) + 4;
        etVal = calcEt > 8 ? 8 : calcEt;
    }
    calcVars.et = etVal;
    document.getElementById('etDisplay').textContent = calcVars.et.toFixed(2);
}

// База данных формул на основе строк таблицы
const drugDB = {
    resuscitation: [
        {
            row: 7, name: "Adrenaline", conc: "1mg/10ml", dose: "0.01 mg/kg",
            calc: (v) => {
                let mg = v.w < 40 ? excelRound(v.w * 0.01, 2) : (v.w < 50 ? 0.5 : 1);
                let ml = excelRound(mg * 10, 2);
                return `${mg.toFixed(2)} mg | ${ml.toFixed(2)} ml`;
            }
        },
        {
            row: 9, name: "Atropine", conc: "1mg/1ml", dose: "0.02mg/kg",
            calc: (v) => {
                let mg = v.w < 5 ? 0.1 : (v.w < 25 ? excelRound(v.w * 0.02, 2) : (v.w < 50 ? 0.5 : 1));
                let ml = excelRound(mg / 1, 2);
                return `${mg.toFixed(2)} mg | ${ml.toFixed(2)} ml`;
            }
        },
        {
            row: 12, name: "Sodium bicarbonate", conc: "1meq/1ml", dose: "1 meq/kg",
            calc: (v) => {
                let meq = v.w; // G12 references D2 conceptually in dynamic dose
                let ml = v.w < 100 ? v.w : 100;
                return `${excelRound(meq, 2).toFixed(2)} meq | ${excelRound(ml, 2).toFixed(2)} ml`;
            },
            note: "For peripheral use mix 1:1 with water"
        },
        {
            row: 15, name: "Ca Gluconate 10%", conc: "100mg/1ml", dose: "100mg/kg",
            calc: (v) => {
                let mg = v.w < 10 ? (100 * v.w) : 1000;
                let ml = excelRound(mg / 100, 2);
                return `${excelRound(mg, 0).toFixed(0)} mg | ${ml.toFixed(2)} ml`;
            }
        },
        {
            row: 17, name: "Lidocaine 1%", conc: "10mg/1ml", dose: "1mg/kg",
            calc: (v) => {
                let mg = v.w;
                let ml = excelRound(mg / 10, 2);
                return `${excelRound(mg, 2).toFixed(2)} mg | ${ml.toFixed(2)} ml`;
            }
        },
        {
            row: 19, name: "Narcan", conc: "0.4mg/ml", dose: "—",
            calc: (v) => "Protocol",
            note: "Dilute 0.4mg in 20ml Nacl 0.9%..."
        },
        {
            row: 21, name: "Adenosine", conc: "3mg/ml", dose: "0.1mg/kg",
            calc: (v) => {
                let mg = excelRound(0.1 * v.w, 2);
                let ml = excelRound(mg / 3, 3);
                return `${mg.toFixed(2)} mg | ${ml.toFixed(3)} ml`;
            },
            note: "Rapid IV push. May increase by 0.05-0.25mg/kg max 12mg"
        },
        {
            row: 24, name: "Defibrillation", conc: "—", dose: "2 joule/kg",
            calc: (v) => `${excelRound(v.w * 2, 1).toFixed(1)} Joule`,
            note: "VF / No sync"
        },
        {
            row: 27, name: "Cardioversion", conc: "—", dose: "0.5 joule/kg",
            calc: (v) => `${excelRound(v.w * 0.5, 1).toFixed(1)} Joule`,
            note: "With sync"
        }
    ],
    intubation: [
        {
            row: 31, name: "Pentotal", conc: "100mg/1ml", dose: "4mg/kg",
            calc: (v) => `${excelRound(v.w * 4, 2).toFixed(1)} mg | ${excelRound((v.w * 4) / 100, 2).toFixed(2)} ml`
        },
        {
            row: 33, name: "Ketamine", conc: "50mg/1ml", dose: "1mg/kg",
            calc: (v) => `${excelRound(v.w, 2).toFixed(1)} mg | ${excelRound(v.w / 50, 2).toFixed(2)} ml`
        },
        {
            row: 35, name: "Atracurium", conc: "10mg/1ml", dose: "0.3mg/kg",
            calc: (v) => `${excelRound(0.3 * v.w, 2).toFixed(2)} mg | ${excelRound((0.3 * v.w) / 10, 2).toFixed(2)} ml`
        },
        {
            row: 37, name: "Fentanyl", conc: "50mcg/1ml", dose: "2mcg/kg",
            calc: (v) => `${excelRound(v.w * 2, 2).toFixed(1)} mcg | ${excelRound((v.w * 2) / 50, 2).toFixed(2)} ml`
        },
        {
            row: 39, name: "Midazolam", conc: "1mg/1ml", dose: "0.1mg/kg",
            calc: (v) => {
                let mg = (v.w * 0.1) > 3 ? 3 : (v.w * 0.1);
                return `${excelRound(mg, 2).toFixed(2)} mg | ${excelRound(mg / 1, 2).toFixed(2)} ml`;
            }
        },
        {
            row: 41, name: "Rocuronium", conc: "10mg/1ml", dose: "1mg/kg",
            calc: (v) => `${excelRound(v.w, 2).toFixed(1)} mg | ${excelRound(v.w / 10, 2).toFixed(2)} ml`
        }
    ],
    sedation: [
        {
            row: 45, name: "Fentanyl (Pure)", conc: "50mcg/1ml", dose: "1 mcg/kg/hr",
            calc: (v) => `${excelRound(v.w / 50, 2).toFixed(2)} ml/hr`, note: "Pure / Can be diluted"
        },
        {
            row: 49, name: "Morphine", conc: "Dilute 1mg/ml", dose: "0.01 - 0.04 mg/kg/hr",
            calc: (v) => `Min: ${excelRound(v.w * 0.01, 2).toFixed(2)} ml/hr<br>Max: ${excelRound(0.04 * v.w, 1).toFixed(2)} ml/hr`
        },
        {
            row: 52, name: "Remifentanil", conc: "Variable", dose: "0.1 mcg/kg/min",
            calc: (v) => `Mix ${excelRound(0.1 * v.w * 60 * 20 / 1000, 2).toFixed(2)} mg to total 20ml`,
            note: "Increase to effect by 0.3ml every 5min. Max 7.4cc/hr. Don't bolus"
        },
        {
            row: 56, name: "Midazolam (5mg/ml)", conc: "5mg/1ml", dose: "0.1 mg/kg/hr",
            calc: (v) => `${excelRound(0.1 * v.w / 5, 2).toFixed(2)} ml/hr`
        },
        {
            row: 57, name: "Midazolam (1mg/ml)", conc: "1mg/1ml", dose: "0.1 mg/kg/hr",
            calc: (v) => `${excelRound(0.1 * v.w, 2).toFixed(2)} ml/hr`
        },
        {
            row: 60, name: "Propofol (Loading)", conc: "10mg/1ml", dose: "1 - 2 mg/kg",
            calc: (v) => {
                let mgMin = excelRound(v.w * 1, 2);
                let mgMax = excelRound(v.w * 2, 2);
                return `Dose: ${mgMin.toFixed(1)} - ${mgMax.toFixed(1)} mg<br>Vol: ${excelRound(mgMin/10, 2).toFixed(2)} - ${excelRound(mgMax/10, 2).toFixed(2)} ml`;
            }
        },
        {
            row: 61, name: "Propofol (Maintenance)", conc: "10mg/1ml", dose: "100 - 200 mcg/kg/min",
            calc: (v) => `Min: ${excelRound(100 * v.w * 60 / 1000 / 10, 2).toFixed(2)} ml/hr<br>Max: ${excelRound(200 * v.w * 60 / 1000 / 10, 2).toFixed(2)} ml/hr`,
            note: "If 20 mg/ml use half rates"
        },
        {
            row: 65, name: "Precedex", conc: "200mcg / 50ml", dose: "0.2 - 0.7 mcg/kg/hr",
            calc: (v) => `Min: ${excelRound(0.2 * v.w / 4, 3).toFixed(2)} ml/hr<br>Max: ${excelRound(0.7 * v.w / 4, 3).toFixed(2)} ml/hr`,
            note: "May load 1mcg/kg -> Vol: " + excelRound(1 * v.w / 4, 2).toFixed(2) + " ml"
        },
        {
            row: 69, name: "Ketamine Infusion", conc: "250mg / 50ml", dose: "0.5 - 2 mg/kg/hr",
            calc: (v) => {
                let min = excelRound(0.5 * v.w / 5, 2);
                // J69 references max dose directly from cell logic structure
                let max = excelRound(2 * v.w / 5, 2); 
                return `Min: ${min.toFixed(2)} ml/hr<br>Max: ${max.toFixed(2)} ml/hr`;
            }
        },
        {
            row: 73, name: "Esmeron (Pure)", conc: "10mg/1ml", dose: "1 mg/kg/hr",
            calc: (v) => `${excelRound(v.w / 10, 2).toFixed(2)} ml/hr`
        }
    ],
    drips: [
        { row: 76, name: "Adrenaline (Drip)", conc: "In 50ml", dose: "1ml/hr = 0.1 mcg/kg/min", calc: (v) => `Mix ${excelRound(0.3 * v.w, 2).toFixed(2)} mg into 50ml` },
        { row: 79, name: "Noradrenaline", conc: "In 50ml", dose: "1ml/hr = 0.1 mcg/kg/min", calc: (v) => `Mix ${excelRound(0.3 * v.w, 2).toFixed(2)} mg into 50ml` },
        { row: 82, name: "Phenylephrine", conc: "In 50ml", dose: "1ml/hr = 0.1 mcg/kg/min", calc: (v) => `Mix ${excelRound(0.3 * v.w, 2).toFixed(2)} mg into 50ml` },
        { row: 86, name: "Dopamine", conc: "In 50ml", dose: "1ml/hr = 1 mcg/kg/min", calc: (v) => `Mix ${excelRound(3 * v.w, 2).toFixed(2)} mg into 50ml`, note: "Complete to 50ml with Nacl 0.9%/Glu 5%" },
        { row: 89, name: "Dobutrex", conc: "In 50ml", dose: "1ml/hr = 1 mcg/kg/min", calc: (v) => `Mix ${excelRound(3 * v.w, 2).toFixed(2)} mg into 50ml` },
        { 
            row: 93, name: "Vasopressin", conc: "In 50ml", dose: "1ml/hr = 0.0001 U/kg/min", 
            calc: (v) => `Mix ${excelRound(0.0001 * v.w * 60 * 50, 4).toFixed(4)} Units into 50ml` 
        },
        { 
            row: 97, name: "Isuprel", conc: "In 50ml", dose: "0.05-2 mcg/kg/min", 
            calc: (v) => `Mix Fixed 400 mcg into 50ml<br>1 ml/hr = ${excelRound(8 / v.w / 60, 3).toFixed(3)} mcg/kg/min` 
        },
        {
            row: 100, name: "Levosimendan", conc: "2.5mg / 50ml Glu 5%", dose: "0.1 mg/kg/day",
            calc: (v) => `${excelRound(0.1 * v.w / 24 * 50 / 2.5, 2).toFixed(2)} ml/hr`, note: "May double dose on second day"
        },
        {
            row: 103, name: "Nitroprusside", conc: "In 50ml Glu 5%", dose: "Max conc 50mg/50ml",
            calc: (v) => {
                let mg = v.w * 3;
                let finalMg = mg > 50 ? 50 : mg; 
                return `Mix ${excelRound(finalMg, 2).toFixed(2)} mg into 50ml<br>(Logic /10: ${excelRound(finalMg/10, 2).toFixed(2)} mg)`;
            },
            note: "up to 16.5kg 1ml/hr=1mcg/kg/min. Max dose 8mcg/kg/min. Add Thiosulphate"
        },
        {
            row: 108, name: "Nitroglycerin", conc: "In 50ml", dose: "0-15kg: 1ml/hr=1mcg/kg/m | >=15kg: 1ml/hr=0.2mcg/kg/m",
            calc: (v) => {
                let mg = v.w <= 15 ? (v.w * 3) : (v.w * 3 / 5);
                return `Mix ${excelRound(mg, 2).toFixed(2)} mg into 50ml`;
            }
        },
        {
            row: 112, name: "Milrinone", conc: "In 50ml", dose: "1ml/hr = 0.375 mcg/kg/min (<50kg)",
            calc: (v) => {
                let mg = v.w <= 50 ? excelRound(1125 * v.w / 1000, 2) : 50;
                return `Mix ${mg.toFixed(2)} mg into 50ml`;
            },
            note: "Loading dose: " + excelRound(v.w * 50, 1).toFixed(0) + " mcg over 15 min"
        },
        {
            row: 116, name: "Esmolol Infusion", conc: "10mg/1ml", dose: "LD: 100mcg/kg over 1 min | MD: 50-500mcg/kg/min",
            calc: (v) => {
                let ld = excelRound(v.w * 100, 1);
                let mdMax = excelRound(500 * v.w * 60 / 1000 / 10, 2);
                return `LD: ${ld.toFixed(0)} mcg<br>MD Max (500 mcg): ${mdMax.toFixed(2)} ml/hr (Min: ${(mdMax/10).toFixed(2)} ml/hr)`;
            }
        },
        {
            row: 120, name: "Labetalol", conc: "Dilute to 1mg/ml", dose: "0.4 - 1 mg/kg/hr (Max 3)",
            calc: (v) => `Min: ${excelRound(0.4 * v.w, 1).toFixed(1)} ml/hr<br>Max: ${excelRound(v.w, 1).toFixed(1)} ml/hr`,
            note: "May bolus: " + excelRound(v.w, 1).toFixed(1) + " ml down to " + excelRound(0.4*v.w/2, 2).toFixed(2) + " ml"
        },
        {
            row: 123, name: "Prostaglandin E", conc: "In 50ml", dose: "1ml/hr = 0.1 mcg/kg/min",
            calc: (v) => `Mix ${excelRound(0.3 * v.w, 2).toFixed(2)} mg into 50ml`, note: "Start with 0.1..."
        },
        {
            row: 127, name: "Epoprostenol", conc: "250mcg / 50ml", dose: "2 - 16 ng/kg/min",
            calc: (v) => `Rate (2 ng): ${excelRound(2 * v.w * 60 / 5000, 3).toFixed(3)} ml/hr`, note: "Dilution in glycine"
        },
        {
            row: 130, name: "Lidocaine (Drip)", conc: "In 50ml Glu 5%", dose: "1ml/hr = 10 mcg/kg/min",
            calc: (v) => `Mix ${excelRound(30 * v.w, 2).toFixed(1)} mg into 50ml`, note: "Range: 20-50 mcg/kg/min"
        },
        {
            row: 134, name: "Amiodarone", conc: "Glu 5% (Peri: 1mg/ml, Cent: 2mg/ml)", dose: "LD: 5mg/kg over 10m | MD: 5-15 mcg/kg/min",
            calc: (v) => {
                let ld = v.w < 31 ? (v.w * 5) : 150;
                let md10 = excelRound(10 * v.w * 60 / 1000, 2);
                return `LD: ${excelRound(ld, 1).toFixed(1)} mg<br>MD (10 mcg): ${md10.toFixed(2)} ml/hr`;
            }
        },
        {
            row: 140, name: "Heparin", conc: "In 50ml", dose: "LD: 50 u/kg | MD: 10-25 u/kg/hr",
            calc: (v) => {
                let ld = 50 * v.w;
                let mdMin = excelRound(v.w * 10 / 100, 1);
                return `LD: ${excelRound(ld, 0).toFixed(0)} Units<br>MD Min: ${mdMin.toFixed(2)} ml/hr (Rate = MD_units * 2.5)`;
            }

// Рендеринг интерфейса таблиц
function renderTable(tableId, list) {
    const table = document.getElementById(tableId);
    let html = `<thead><tr><th style="width:40px;">Row</th><th>Drug Name</th><th>Concentration / Target Dose</th><th>Calculated Output (Excel Logic)</th><th>Clinical Notes</th></tr></thead><tbody>`;

    list.forEach(item => {
        let output = item.calc ? item.calc(calcVars) : '—';
        html += `
            <tr>
                <td style="color:#94a3b8; font-size:11px;">${item.row}</td>
                <td><strong>${item.name}</strong></td>
                <td><small style="color:#475569;">${item.conc || ''}</small><br><b>${item.dose || ''}</b></td>
                <td><span class="dose-value">${output}</span></td>
                <td class="info">${item.note || '—'}</td>
            </tr>`;
    });
    html += '</tbody>';
    table.innerHTML = html;
}

function updateAll() {
    updateCalculatedVariables();

    renderTable('resus-table', drugDB.resuscitation);
    renderTable('intub-table', drugDB.intubation);
    renderTable('sedation-table', drugDB.sedation);
    renderTable('drip-table', drugDB.drips);
    renderTable('various-table', drugDB.various);
    renderTable('abx-table', drugDB.antibiotics);
}

// Переключение табов
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        document.getElementById('tab-' + btn.dataset.tab).style.display = 'block';
    });
});

window.onload = updateAll;
